name: Build

on:
  push:
    branches-ignore:
      - main
  workflow_call:
    inputs:
      artifacts:
        required: false
        type: boolean
        default: false
        description: upload artifacts or not

jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # to request JWT from GitHub OIDC provider
      contents: read # required for actions/checkout
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      # Linting, Type checks, tests

      # Package in dist/app.zip

      - name: Upload artifacts
        if: inputs.artifacts
        uses: actions/upload-artifact@v6
        with:
          path: dist/app.zip
